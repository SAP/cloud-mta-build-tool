#
# Golang CircleCI 2.0 configuration
version: 2.1
jobs:
  build-node:
    docker:
      - image: cimg/node:lts
    working_directory: ~/repo
    steps:
      - checkout
      - run: node -v
      - run: npm install
      - run: npm run test
  build-node24:
    docker:
      - image: cimg/node:24.7
    working_directory: ~/repo
    steps:
      - checkout
      - run: node -v
      - run: npm install
      - run: npm run test
  build-node22:
    docker:
      - image: cimg/node:22.15.1
    working_directory: ~/repo
    steps:
      - checkout
      - run: node -v
      - run: npm install
      - run: npm run test
  build-node20:
    docker:
      - image: cimg/node:20.1
    working_directory: ~/repo
    steps:
      - checkout
      - run: node -v
      - run: npm install
      - run: npm run test
  build:
    docker:
      - image: cimg/go:1.21
    environment:
    working_directory: ~/go/src/github.com/SAP/cloud-mta-build-tool
    steps:
      - checkout
      - run: go version
      - run: go env
      - run:
          name: install dependencies
          command: |
            go mod vendor
      - run:
          name: install node20 npm and npx
          command: |
            sudo apt-get update
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
            echo "node version:"
            node --version
            echo "npm version:"
            npm --version
            echo "npx version:"
            npx --version
      - run:
          name: install cyclonedx-cli
          command: |
            CYCLONEDX_CLI_VERSION=0.27.1
            CYCLONEDX_BINARY_NAME=cyclonedx
            CYCLONEDX_ARCH=x64
            CYCLONEDX_OS=linux
            curl -fsSLO --compressed "https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${CYCLONEDX_CLI_VERSION}/${CYCLONEDX_BINARY_NAME}-${CYCLONEDX_OS}-${CYCLONEDX_ARCH}"
            chmod ug+rwx ${CYCLONEDX_BINARY_NAME}-${CYCLONEDX_OS}-${CYCLONEDX_ARCH}
            cp ${CYCLONEDX_BINARY_NAME}-${CYCLONEDX_OS}-${CYCLONEDX_ARCH} ${GOPATH}/bin/${CYCLONEDX_BINARY_NAME}
            echo "cyclonedx-cli --version:"
            ${CYCLONEDX_BINARY_NAME} --version
      - run:
          name: install cyclonedx-gomod
          command: |
            echo "cyclonedx-gomod version"
            go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.4.0
            cyclonedx-gomod version
      - run:
          name: install cyclonedx-npm
          command: |
            CYCLONEDX_NPM_PACKAGE=@cyclonedx/cyclonedx-npm
            CYCLONEDX_NPM_VERSION=1.19.3
            CYCLONEDX_NPM_BINARY=cyclonedx-npm
            echo "npx ${CYCLONEDX_NPM_PACKAGE}@${CYCLONEDX_NPM_VERSION} -h"
            npx ${CYCLONEDX_NPM_PACKAGE}@${CYCLONEDX_NPM_VERSION} -h
      - run:
          name: build mbt binary
          command: |
            BINARY_NAME=mbt
            BUILD_DIR=release
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ${BUILD_DIR}/${BINARY_NAME} -v
            chmod ug+rwx ${BUILD_DIR}/${BINARY_NAME}
            cp ${BUILD_DIR}/${BINARY_NAME} ${GOPATH}/bin/${BINARY_NAME}
            ${BINARY_NAME} --version
      - run: sudo chown circleci:circleci ${GOPATH}/bin
      - run: make tools
      - run: make lint
      - run:
          name: cov install coverge deps
          command: |
            go install golang.org/x/tools/cmd/cover@latest
            go install github.com/mattn/goveralls@v0.0.12
            go install github.com/modocache/gover@v0.0.0-20171022184752-b58185e213c5
      - run: go test -v ./... -coverprofile=mta.coverprofile -count=1 -timeout 30m
      - run: gover
      - run: goveralls -v -service=circle-ci -coverprofile=gover.coverprofile -repotoken $COVERALLS_TOKEN

  test:
    docker:
      - image: cimg/go:1.21-node
    working_directory: ~/go/src/github.com/SAP/cloud-mta-build-tool
    steps:
      - checkout
      - run:
          name: install dependencies
          command: |
            go mod vendor
      - run:
          name: install cf cli
          command: |
            curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&&version=8.8.3" | sudo tar -zx -C /usr/local/bin
      - run:
          name: install MTA cf plugins
          command: |
            cf install-plugin multiapps -f
      - run:
          name: create isolated CF space for this pipeline run
          command: |
            TEST_SPACE="mbt-ci-${CIRCLE_BUILD_NUM}"
            cf login -a $CF_API -o $ORG -s $SPACE -u $TECH_USER -p $TECH_PASS
            cf create-space "$TEST_SPACE" -o $ORG
            cf target -o $ORG -s "$TEST_SPACE"
            echo "export TEST_SPACE=$TEST_SPACE" >> $BASH_ENV
      - run:
          name: run integration tests
          command: |
            cd integration && SPACE="$TEST_SPACE" go test -tags=integration
      - run:
          name: delete isolated CF space
          when: always
          command: |
            cf target -o $ORG -s $SPACE
            cf delete-space "$TEST_SPACE" -f

  compliance:
    docker:
      - image: cimg/python:3.10.0
    working_directory: ~/go/src/github.com/SAP/cloud-mta-build-tool
    steps:
      - checkout
      - run:
          name: compliance check
          command: |
            pip3 install --user reuse
            ~/.local/bin/reuse lint

  ghpages:
    docker:
      - image: squidfunk/mkdocs-material:4.3.1
    working_directory: ~/go/src/github.com/SAP/cloud-mta-build-tool
    steps:
      - checkout
      - run:
          name: release to GitHub Pages
          command: |
            cd docs
            mkdocs gh-deploy --config-file ../docs/mkdocs.yml --remote-branch gh-pages

  release-to-github:
    docker:
      - image: cimg/go:1.21
    working_directory: ~/go/src/github.com/SAP/cloud-mta-build-tool
    steps:
      - add_ssh_keys:
          fingerprints:
            - "c3:2b:e9:bb:d5:05:32:ab:df:ce:2b:c3:e5:f7:95:42"
      - run:
          name: Enable SSH debugging
          command: |
            mkdir -p ~/.ssh
            echo "LogLevel DEBUG3" >> ~/.ssh/config
      - checkout
      - run:
          name: install dependencies
          command: |
            go mod vendor
      - run:
          name: install goreleaser
          command: |
            go install github.com/goreleaser/goreleaser@v1.18.2
            echo "goreleaser --version:"
            goreleaser --version
      - run:
          name: bump version
          command: |
            #Make sure HEAD points to master
            echo "Release processed by ${CLOUD_MTA_BOT_EMAIL}/${CLOUD_MTA_BOT_USER}"
            git checkout master
            CURR_MBT_VERSION=$(cat ./VERSION)
            echo "Current release: ${CURR_MBT_VERSION}"
            MBT_VERSION=$(echo $CURR_MBT_VERSION|awk -F. -v MAJOR_VAR="$MAJOR" -v MINOR_VAR="$MINOR" -v PATCH_VAR="$PATCH" '{
              if (MAJOR_VAR == "true"){
                $1++
                $2=0
                $3=0
              } else if (MINOR_VAR == "true"){
                $2++
                $3=0
              } else if (PATCH_VAR == "true"){
                $3++
              } 
              printf "%d.%d.%d\n", $1, $2 ,$3 
            }')
            echo "New release: ${MBT_VERSION}"
            #Update new version in files
            sed -i "/\"version\":/s/${CURR_MBT_VERSION}/${MBT_VERSION}/" ./package.json
            sed -i "/cli_version:/s/${CURR_MBT_VERSION}/${MBT_VERSION}/" ./configs/version.yaml
            sed -i "s/${CURR_MBT_VERSION}/${MBT_VERSION}/" ./VERSION
            sed -i "/ARG MBT_VERSION=/ s/${CURR_MBT_VERSION}/${MBT_VERSION}/" ./Dockerfile_mbtci_template
            sed -i "/- Cloud MTA Build Tool -/s/${CURR_MBT_VERSION}/${MBT_VERSION}/" ./README.md
            #Generate version file
            go generate -run "go run ./internal/buildtools/embed.go ./internal/buildtools/buildtools_msg.go -source=./configs/version.yaml -target=./internal/version/version_cfg.go -name=VersionConfig -package=version"
            #Add all updated files to commit
            git add ./package.json ./configs/version.yaml ./VERSION ./internal/version/version_cfg.go ./Dockerfile_mbtci_template ./test/goss/goss_template.yaml ./README.md 
            git config user.email "${CLOUD_MTA_BOT_EMAIL}"
            git config user.name "${CLOUD_MTA_BOT_USER}"
            git commit --allow-empty -m "[skip ci] Bump version ${MBT_VERSION}"
            git config -l
            #Push commit directly to master
            git push -v https://github.com/SAP/cloud-mta-build-tool.git master
            #Tag
            git tag -a v${MBT_VERSION} -m "New release ${MBT_VERSION}"
            git push https://github.com/SAP/cloud-mta-build-tool.git v${MBT_VERSION}
      - run:
          name: release new version
          command: |
            #Make sure HEAD points to master
            git checkout master
            export GITHUB_TOKEN=${CLOUD_MTA_BOT_GITHUB_TOKEN}
            goreleaser release
            #curl -sfL https://goreleaser.com/static/run | bash

